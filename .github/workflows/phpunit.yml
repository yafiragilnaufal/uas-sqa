name: CI - PHPUnit Test Mahasiswa Baru USTI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  phpunit:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'

      - name: Install Composer
        run: composer install

      - name: Run PHPUnit
        run: vendor/bin/phpunit tests
